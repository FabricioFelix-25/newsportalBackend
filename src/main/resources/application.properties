server.port=${PORT:9090}
server.servlet.context-path=/api

spring.application.name=AlpesNews Backend

# PostgreSQL padrao local
# Usuario criado: newsportal_app
# Banco criado: portal_news
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portal_news}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:newsportal_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:newsportal123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

file.upload-dir=uploads/images

logging.level.com.newsportal=INFO
logging.level.org.springframework.security=INFO

# Security
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:AlpesNewsJwtSecretKeyChangeInProduction_2026_VeryLong123}
app.security.jwt.expiration-minutes=${APP_SECURITY_JWT_EXPIRATION_MINUTES:180}
app.auth.debug-reset-token=${APP_AUTH_DEBUG_RESET_TOKEN:false}

# Admin inicial (desenvolvimento)
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.name=${APP_BOOTSTRAP_ADMIN_NAME:}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
